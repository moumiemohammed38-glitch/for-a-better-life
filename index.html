<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For A Better Life - Catalog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="phone-container">
    <div class="phone-notch"></div>

    <header class="header">
      <button class="icon-btn" id="menuBtn" aria-label="Menu">
        <span class="hamburger"></span>
      </button>
      
      <h1 class="logo-text">For A Better Life</h1>
      
      <button class="icon-btn" id="searchBtn" aria-label="Search">
        <span class="search-icon"></span>
      </button>
    </header>

    <main class="content">
      
      <section class="section">
        <h2 class="section-title">Chairs</h2>
        <div class="category-grid">
          <div class="image-box">
            <img src="image/madara citaton.jpg" alt="Madara Chair" class="local-img">
          </div>
          <div class="image-box">
            <img src="image/me.jpg" alt="Accent Chair" class="local-img">
          </div>
          <div class="image-box">
            <img src="image/messi.jpg" alt="Messi Chair" class="local-img">
          </div>
        </div>
      </section>

      <div class="tags-container">
        <button class="tag-pill active">Category</button>
        <button class="tag-pill">Size</button>
        <button class="tag-pill">Colour</button>
        <button class="tag-pill">+ Filters</button>
      </div>

      <section class="section">
        <h2 class="section-title">Products</h2>
        
        <article class="product-card" data-product-id="strandmon-01">
          <div class="product-thumb">
            <img src="image/god.jpg" alt="Strandmon Chair" class="local-img">
          </div>
          <div class="product-info">
            <div class="product-meta">
              <h3 class="product-title">Strandmon</h3>
              <p class="product-description">Personal pic with a good visual view</p>
            </div>
            <div class="product-footer">
              <span class="product-price">$2.89</span>
            </div>
          </div>
        </article>

        <article class="product-card" data-product-id="sotenas-02">
          <div class="product-thumb">
            <img src="image/WIN_20260612_20_09_44_Pro.jpg" alt="Sotenas Chair" class="local-img">
          </div>
          <div class="product-info">
            <div class="product-meta">
              <h3 class="product-title">Sotenas</h3>
              <p class="product-description">Functional layout item with responsive styling</p>
            </div>
            <div class="product-footer">
              <span class="product-price">$84.99</span>
            </div>
          </div>
        </article>
        
      </section>
    </main>

    <div class="home-indicator"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
