<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
        <img src="image/god.jpg" alt="logo" class="logo-img">
    </div>
    <div class="phone-container">
    <div class="phone-notch"></div>

    <header class="header">
      <button class="icon-btn" id="menuBtn" aria-label="Menu">
        <span class="hamburger"></span>
      </button>
      
      <div class="logo-text"> for a better life</div>
      
      <button class="icon-btn" id="searchBtn" aria-label="Search">
        <span class="search-icon"></span>
      </button>
    </header>

    <main class="content">
      
      <section class="section">
        <h2 class="section-title">Category</h2>
        <div class="category-grid">
          <div class="image-box">
            <img src="image/madara citaton.jpg" alt="Category 1" class="local-img">
          </div>
<div class="image-box">
            <img src="image/messi.jpg" alt="Category 2" class="local-img">
          </div>
          <div class="image-box">
            <img src="image/me.jpg" alt="Category 3" class="local-img">
          </div>
        </div>
      </section>

      <div class="tags-container">
        <span class="tag-pill" data-tag="1">Tag</span>
        <span class="tag-pill" data-tag="2">Tag</span>
        <span class="tag-pill" data-tag="3">Tag</span>
        <span class="tag-pill" data-tag="4">Tag</span>
      </div>

      <section class="section">
        <h2 class="section-title">Products</h2>
        
        <div class="product-card" data-product-id="101">
          <div class="product-thumb">
            <img src="image/WIN_20260612_20_09_44_Pro.jpg" alt="Product 1" class="local-img">
          </div>
          <div class="product-info">
            <div class="text-line title-line">Title</div>
            <div class="text-line body-line"></div>
            <div class="button-placeholder"></div>
          </div>
        </div>

        <div class="product-card" data-product-id="102">
          <div class="product-thumb">
            <img src="image/messi.jpg" alt="Product 2" class="local-img">
          </div>
          <div class="product-info">
            <div class="text-line title-line">Title</div>
            <div class="text-line body-line"></div>
            <div class="button-placeholder"></div>
          </div>
        </div>
        
      </section>
    </main>

    <div class="home-indicator"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
